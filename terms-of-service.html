<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms of Service - ABC & Friendly Play</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/site-motion.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      padding-top: 90px;
      line-height: 1.7;
    }
    
    /* Modern Navbar Styles */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }
    
    .company-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(90deg, #ff6b6b, #ffa502, #ff6b6b);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 3s linear infinite;
      letter-spacing: -0.5px;
    }
    
    .company-name::before {
      content: "🎮";
      font-size: 1.5rem;
    }
    
    .nav-links {
      display: flex;
      gap: 18px;
      align-items: center;
      flex-shrink: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    
    .nav-link {
      position: relative;
      text-decoration: none;
      color: #e0e0e0;
      font-weight: 500;
      font-size: 1rem;
      padding: 8px 0;
      white-space: nowrap;
    }
    
    .nav-link.active {
      color: #fff;
      font-weight: 600;
    }
    
    .nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, #ff6b6b, #ffa502);
      border-radius: 3px;
    }
    
    /* Privacy Policy Styles */
    .privacy-container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .privacy-header {
      text-align: center;
      margin-bottom: 50px;
      padding-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .privacy-title {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff9a9e, #fad0c4, #a1c4fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .privacy-subtitle {
      font-size: 1.3rem;
      color: #b8c1ec;
      max-width: 700px;
      margin: 0 auto 20px;
    }
    
    .effective-date {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 10px 25px;
      border-radius: 50px;
      font-size: 1.1rem;
      margin-top: 15px;
      color: #ffd166;
      font-weight: 600;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .privacy-content {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 50px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }
    
    .policy-section {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
      position: relative;
      counter-increment: section-counter; /* Added counter */
    }
    
    .policy-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    
    .section-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: #ff9a9e;
      display: flex;
      align-items: center;
      position: relative;
      padding-left: 40px;
    }
    
    .section-title::before {
      content: counter(section-counter); /* Use counter for numbering */
      position: absolute;
      left: 0;
      width: 30px;
      height: 30px;
      background: linear-gradient(135deg, #ff6b6b, #ffa502);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #16213e;
    }
    
    .section-content {
      color: #e0e0e0;
      padding-left: 40px;
    }
    
    .section-content p {
      margin-bottom: 20px;
    }
    
    .section-content ul {
      margin: 20px 0;
      padding-left: 30px;
    }
    
    .section-content li {
      margin-bottom: 15px;
      position: relative;
      padding-left: 20px;
    }
    
    .section-content li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      width: 8px;
      height: 8px;
      background: linear-gradient(135deg, #ff6b6b, #ffa502);
      border-radius: 50%;
    }
    
    .highlight {
      background: rgba(255, 255, 255, 0.08);
      padding: 15px 20px;
      border-radius: 12px;
      margin: 25px 0;
      border-left: 4px solid #ff6b6b;
    }
    
    .contact-link {
      color: #ffa502;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .contact-link:hover {
      color: #ff6b6b;
      text-decoration: underline;
    }
    
    .contact-link::after {
      content: '↗';
      margin-left: 5px;
      display: inline-block;
      transition: transform 0.3s ease;
    }
    
    .contact-link:hover::after {
      transform: translate(3px, -3px);
    }
    
    .privacy-footer {
      text-align: center;
      margin-top: 50px;
      padding-top: 30px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: #b8c1ec;
      font-size: 1.1rem;
    }
    
    .privacy-footer a {
      color: #ffd166;
      text-decoration: none;
    }

    /* Loading State */
    .loader-container {
      display: flex;
      justify-content: center;
      padding: 60px;
    }
    
    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(255, 255, 255, 0.1);
      border-bottom-color: #ff6b6b;
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }
    
    .error-message {
      text-align: center;
      padding: 40px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 20px;
      max-width: 800px;
      margin: 0 auto;
      border: 1px solid rgba(255, 107, 107, 0.3);
    }
    
    .error-message i {
      font-size: 3rem;
      color: #ff6b6b;
      margin-bottom: 20px;
    }
    
    .retry-button {
      background: linear-gradient(135deg, #ff6b6b, #ffa502);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
      display: inline-block;
    }
    
    /* Animations */
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .policy-section {
      animation: fadeIn 0.6s ease-out forwards;
      opacity: 0;
    }
    
    /* Responsive adjustments */
    @media (max-width: 900px) {
      .privacy-content {
        padding: 30px;
      }
      
      .privacy-title {
        font-size: 2.8rem;
      }
      
      .section-title {
        font-size: 1.5rem;
        padding-left: 35px;
      }
      
      .section-title::before {
        width: 25px;
        height: 25px;
      }
      
      .section-content {
        padding-left: 35px;
      }
    }
    
    @media (max-width: 768px) {
      .navbar {
        padding: 15px 20px;
      }
      
      .company-name {
        font-size: 1.5rem;
      }
      
      .nav-links {
        gap: 15px;
      }
      
      .privacy-title {
        font-size: 2.2rem;
      }
      
      .privacy-subtitle {
        font-size: 1.1rem;
      }
      
      .privacy-content {
        padding: 25px 20px;
      }
      
      .section-title {
        font-size: 1.3rem;
        padding-left: 30px;
      }
      
      .section-content {
        padding-left: 0;
      }
    }
    
    @media (max-width: 480px) {
      .privacy-title {
        font-size: 2rem;
      }
      
      .section-title {
        font-size: 1.2rem;
        padding-left: 25px;
      }
      
      .section-title::before {
        width: 20px;
        height: 20px;
        font-size: 0.8rem;
      }
      
      .effective-date {
        font-size: 1rem;
        padding: 8px 20px;
      }
    }
  </style>
</head>
<body>

<!-- Modern Vibrant Navbar -->
<nav class="navbar" aria-label="Main navigation">
  <div class="company-name">A,B,C & Friendly Play</div>
  
  <div class="nav-links">
    <a href="index.html" class="nav-link">Games</a>
    <a href="contact.html" class="nav-link">Contact</a>
    <a href="privacy-policy.html" class="nav-link">Privacy</a>
    <a href="terms-of-service.html" class="nav-link active">Terms</a>
  </div>
</nav>

<main class="privacy-container">
  <header class="privacy-header">
    <h1 class="privacy-title">Terms of Service</h1>
    <p class="privacy-subtitle">These terms govern your use of ABC Games and Friendly Play apps, games, and related services.</p>
    <div class="effective-date">Effective Date: July 18, 2026</div>
  </header>
  
  <div class="privacy-content" id="termsContent">
    <div class="loader-container">
      <span class="loader"></span>
      <p style="margin-top: 20px; color: #b8c1ec;">Loading terms of service...</p>
    </div>
  </div>
  
  <div class="privacy-footer">
    <p>© 2026 A,B,C & Friendly Play. All rights reserved.</p>
  </div>
</main>

<script>
  const TERMS_SECTIONS = [
    {
      "title": "Acceptance of Terms",
      "content": `
        <p>Welcome to A,B,C & Friendly Play. By downloading, installing, accessing, or playing our games and related services (the "Services"), you agree to be bound by these Terms of Service.</p>
        <div class="highlight">
          <p>If you do not agree to these Terms, please do not use our Services. For questions, contact us at <a href="mailto:abchub.help@gmail.com" class="contact-link">abchub.help@gmail.com</a>.</p>
        </div>
      `
    },
    {
      "title": "License to Use",
      "content": `
        <p>We grant you a limited, non-exclusive, non-transferable, revocable license to download and use our games for personal, non-commercial entertainment purposes, subject to these Terms.</p>
        <ul>
          <li>You may not copy, modify, distribute, sell, or lease any part of our Services</li>
          <li>You may not reverse engineer or attempt to extract the source code of our games</li>
          <li>You may not use our Services for any unlawful or unauthorized purpose</li>
        </ul>
      `
    },
    {
      "title": "User Conduct",
      "content": `
        <p>When using our Services, you agree not to:</p>
        <ul>
          <li>Cheat, hack, exploit bugs, or use unauthorized third-party software</li>
          <li>Harass, abuse, or harm other players or our team</li>
          <li>Upload or share offensive, illegal, or infringing content</li>
          <li>Interfere with or disrupt the operation of our Services</li>
          <li>Impersonate another person or misrepresent your affiliation</li>
        </ul>
      `
    },
    {
      "title": "In-App Purchases & Virtual Items",
      "content": `
        <p>Some of our games may offer in-app purchases, including virtual currency, items, or subscriptions.</p>
        <ul>
          <li>All purchases are processed by the app store (Apple App Store or Google Play) and are subject to their terms</li>
          <li>Virtual items have no real-world monetary value and cannot be exchanged for cash</li>
          <li>Purchases are generally non-refundable except where required by applicable law or the app store's refund policy</li>
          <li>We may modify, remove, or adjust virtual items at any time</li>
        </ul>
      `
    },
    {
      "title": "Advertising",
      "content": `
        <p>Our free games may display advertisements provided by third-party networks. By using our Services, you acknowledge that ads may appear during gameplay. Ad interactions may be governed by the privacy policies of those third-party providers. See our <a href="privacy-policy.html" class="contact-link">Privacy Policy</a> for more information.</p>
      `
    },
    {
      "title": "Intellectual Property",
      "content": `
        <p>All content in our Services — including games, artwork, characters, music, text, trademarks, and software — is owned by A,B,C & Friendly Play or our licensors and is protected by intellectual property laws.</p>
        <p>You retain ownership of any feedback you send us, but you grant us a worldwide, royalty-free license to use that feedback to improve our Services.</p>
      `
    },
    {
      "title": "Disclaimer of Warranties",
      "content": `
        <p>Our Services are provided "as is" and "as available" without warranties of any kind, whether express or implied, including but not limited to merchantability, fitness for a particular purpose, and non-infringement.</p>
        <div class="highlight">
          <p>We do not guarantee that our Services will be uninterrupted, error-free, or free of harmful components.</p>
        </div>
      `
    },
    {
      "title": "Limitation of Liability",
      "content": `
        <p>To the fullest extent permitted by law, A,B,C & Friendly Play and its developers shall not be liable for any indirect, incidental, special, consequential, or punitive damages, or any loss of profits or data, arising from your use of or inability to use the Services.</p>
        <p>Our total liability for any claim related to the Services shall not exceed the amount you paid us (if any) in the twelve months preceding the claim.</p>
      `
    },
    {
      "title": "Termination",
      "content": `
        <p>We may suspend or terminate your access to the Services at any time if you violate these Terms or for any other reason we deem necessary to protect our Services or other users.</p>
        <p>You may stop using our Services at any time by uninstalling our apps. Provisions that by their nature should survive termination will remain in effect.</p>
      `
    },
    {
      "title": "Changes to These Terms",
      "content": `
        <p>We may update these Terms of Service from time to time. We will post the updated Terms on this page and update the Effective Date.</p>
        <p>Your continued use of the Services after changes are posted constitutes acceptance of the revised Terms. If you do not agree, please stop using our Services.</p>
      `
    },
    {
      "title": "Contact Us",
      "content": `
        <p>If you have any questions about these Terms of Service, please contact us:</p>
        <div class="highlight">
          <p>Email: <a href="mailto:abchub.help@gmail.com" class="contact-link">abchub.help@gmail.com</a></p>
          <p>Website: <a href="contact.html" class="contact-link">Contact page</a></p>
        </div>
      `
    }
  ];

  function loadTermsContent() {
    const termsContent = document.getElementById('termsContent');
    
    try {
      document.body.style.counterReset = "section-counter";
      
      let contentHTML = '';
      
      TERMS_SECTIONS.forEach((section, index) => {
        contentHTML += `
          <section class="policy-section" style="animation-delay: ${index * 0.1}s">
            <h2 class="section-title">${section.title}</h2>
            <div class="section-content">
              ${section.content}
            </div>
          </section>
        `;
      });
      
      termsContent.innerHTML = contentHTML;
      
      document.querySelectorAll('.policy-section').forEach(section => {
        section.style.animationPlayState = 'running';
      });

      if (typeof window.siteMotionRefresh === 'function') {
        window.siteMotionRefresh();
      }
      
    } catch (error) {
      console.error('Error loading terms content:', error);
      termsContent.innerHTML = `
        <div class="error-message">
          <i class="fas fa-exclamation-triangle"></i>
          <h3>Couldn't Load Terms of Service</h3>
          <p>We're having trouble loading our terms at the moment. Please try again later.</p>
          <p><small>Error: ${error.message}</small></p>
          <button class="retry-button" onclick="loadTermsContent()">
            <i class="fas fa-redo"></i> Try Again
          </button>
        </div>
      `;
    }
  }
  
  document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.querySelectorAll('.nav-link');
    const currentPage = window.location.pathname.split('/').pop();
    
    navLinks.forEach(link => {
      const linkPage = link.getAttribute('href');
      if (currentPage === linkPage) {
        link.classList.add('active');
      }
    });
    
    loadTermsContent();
  });
  
  const observerOptions = {
    root: null,
    rootMargin: '0px',
    threshold: 0.1
  };
  
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.style.animationPlayState = 'running';
      }
    });
  }, observerOptions);
</script>
<script src="includes/site-motion.js"></script>
    
</body>
</html>
